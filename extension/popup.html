<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; font-family: monospace;
           background: #0a0e1a; color: #e2e8f0; padding: 16px; }
    h2   { color: #3b82f6; letter-spacing: 2px; }
    input { width: 100%; padding: 8px; background: #1a2235;
            border: 1px solid #3b82f6; color: white;
            border-radius: 6px; margin: 8px 0; }
    button { width: 100%; padding: 10px; background: #3b82f6;
             border: none; color: white; border-radius: 6px;
             cursor: pointer; font-family: monospace;
             letter-spacing: 1px; }
    #result { margin-top: 12px; padding: 10px;
              border-radius: 6px; display: none; }
    .safe    { background: rgba(34,197,94,0.1);
               border: 1px solid rgba(34,197,94,0.3); }
    .phish   { background: rgba(239,68,68,0.1);
               border: 1px solid rgba(239,68,68,0.3); }
  </style>
</head>
<body>
  <h2>PHISHGUARD</h2>
  <input id="url" placeholder="https://example.com"/>
  <button onclick="scan()">SCAN URL</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
